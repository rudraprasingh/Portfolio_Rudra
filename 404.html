<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 — Page Not Found</title>
  <meta name="description" content="Even the most structured paths have their deviations. 404 - Page Not Found.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <!-- WEBSITE ICON (FAVICON) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23080808%22 rx=%2220%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.35em%22 font-size=%2260%22 fill=%22%23c9a87c%22 font-family=%22'Cormorant Garamond', Georgia, serif%22 font-style=%22italic%22 font-weight=%22300%22 letter-spacing=%22-2%22>RP</text></svg>">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    :root {
      --ink: #060606;
      --paper: #ede8e0;
      --dim: rgba(237, 232, 224, 0.30);
      --accent: #c9a87c;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', system-ui, sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    @media(pointer:coarse) { body { cursor: auto !important; } }
    a, button { cursor: none !important; }
    @media(pointer:coarse) { a, button { cursor: auto !important; } }

    /* ── Background Elements ── */
    #grain {
      position: fixed;
      inset: -50%;
      z-index: 7999;
      pointer-events: none;
      opacity: 0.035;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 7998;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 30%, rgba(6,6,6,0.5) 100%);
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      z-index: 9000;
      pointer-events: none;
      mix-blend-mode: difference;
      top: 0;
      left: 0;
      will-change: transform;
    }
    #cursor-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f2f0eb;
      transform: translate(-50%, -50%) scale(1);
      transition: transform .4s var(--ease-out), opacity .4s var(--ease-out);
      will-change: transform, opacity;
    }
    #cursor.is-idle #cursor-dot { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    #cursor.expanded #cursor-dot { transform: translate(-50%, -50%) scale(6.67); }
    #cursor.link #cursor-dot { transform: translate(-50%, -50%) scale(4); }

    /* ── Content ── */
    .container {
      text-align: center;
      position: relative;
      z-index: 10;
      padding: 2rem;
    }

    .error-code {
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: clamp(8rem, 25vw, 18rem);
      line-height: .8;
      letter-spacing: -.05em;
      color: var(--paper);
      margin-bottom: 2.5rem;
      position: relative;
      user-select: none;
    }

    .message {
      font-family: var(--serif);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-style: italic;
      color: var(--dim);
      max-width: 500px;
      margin: 0 auto 3.5rem;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    /* ── Button ── */
    .btn-p {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .25em;
      text-transform: uppercase;
      background: var(--paper);
      color: var(--ink);
      padding: 1.4rem 3.2rem;
      border-radius: 100px;
      text-decoration: none;
      transition: background .4s var(--ease-out), transform .4s var(--ease-out), color .4s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .btn-p::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
      transition: left 0.6s ease;
      pointer-events: none;
    }
    .btn-p:hover::before { left: 100%; }
    .btn-p svg { transition: transform 0.5s var(--ease-out); }
    .btn-p:hover { background: #fff; transform: scale(1.04) translateY(-2px); color: #000; }
    .btn-p:hover svg { transform: translateX(5px) rotate(-45deg) scale(1.2); }

    @media(max-height: 500px) {
      .error-code { font-size: 6rem; margin-bottom: 1rem; }
      .message { margin-bottom: 2rem; }
    }
  </style>
</head>

<body>
  <div id="grain"></div>
  <div id="vignette"></div>

  <!-- Ink Cursor -->
  <div id="cursor">
    <div id="cursor-dot"></div>
  </div>

  <div class="container">
    <div class="error-code" id="code">404</div>
    <p class="message" id="msg">Even the most structured paths have their deviations. You've drifted into the void.</p>
    <a href="index.html" class="btn-p magnetic" id="back-btn">
      Return to Presence
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M7 17L17 7M17 7H7M17 7v10" />
      </svg>
    </a>
  </div>

  <script>
    // ── Cursor ──
    const cur = document.getElementById('cursor');
    let tx = 0, ty = 0, cx = 0, cy = 0;
    let idleTimer;
    
    const showCursor = () => {
      cur.classList.remove('is-idle');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => cur.classList.add('is-idle'), 1200);
    };

    window.addEventListener('mousemove', e => {
      tx = e.clientX; ty = e.clientY;
      showCursor();
    }, { passive: true });

    window.addEventListener('mouseover', e => {
      const el = e.target.closest('a, button');
      if (el) cur.classList.add('link');
      else cur.classList.remove('link');
    }, { passive: true });

    function loop() {
      cx += (tx - cx) * 0.15;
      cy += (ty - cy) * 0.15;
      cur.style.transform = `translate(${cx}px, ${cy}px)`;
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ── Magnet ──
    document.querySelectorAll('.magnetic').forEach(el => {
      el.addEventListener('mousemove', e => {
        const { left, top, width, height } = el.getBoundingClientRect();
        const x = (e.clientX - left - width / 2) * 0.4;
        const y = (e.clientY - top - height / 2) * 0.4;
        gsap.to(el, { x, y, duration: 0.6, ease: 'power2.out' });
      });
      el.addEventListener('mouseleave', () => {
        gsap.to(el, { x: 0, y: 0, duration: 0.6, ease: 'elastic.out(1, 0.3)' });
      });
    });

    // ── Entrance ──
    const tl = gsap.timeline();
    tl.from('#code', { opacity: 0, y: 40, duration: 1.5, ease: 'power4.out' })
      .from('#msg', { opacity: 0, y: 20, duration: 1.2, ease: 'power3.out' }, '-=1')
      .from('#back-btn', { opacity: 0, scale: 0.9, duration: 1, ease: 'power2.out' }, '-=0.8');

    // Subtle Float
    gsap.to('#code', {
      y: -20,
      duration: 3,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut'
    });
  </script>
</body>

</html>
